name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Nx sync check
        run: pnpm nx sync:check

      - name: Typecheck
        run: pnpm nx run-many -t typecheck

      - name: Lint
        run: pnpm nx run-many -t lint

      - name: Test
        run: pnpm nx run-many -t test --runInBand

      - name: Build
        run: pnpm nx run-many -t build
