name: quorum-audit

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: quorum-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quorum-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify quorum signatures on current head
        shell: bash
        run: |
          set -euo pipefail

          comments_json="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments")"

          author_found="$(
            jq -r --arg sha "$PR_HEAD_SHA" '
              any(.[]; (.body // "") | test("^Agent WS[12]\\b.*\\b" + $sha + "\\b"; "m"))
            ' <<<"$comments_json"
          )"

          reviewer_found="$(
            jq -r --arg sha "$PR_HEAD_SHA" '
              any(.[]; (.body // "") | test("^Agent R3:\\s+(no findings on|concur at) " + $sha + "\\b"; "m"))
            ' <<<"$comments_json"
          )"

          boss_found="$(
            jq -r --arg sha "$PR_HEAD_SHA" '
              any(.[]; (.body // "") | test("^Agent BOSS:\\s+concur at " + $sha + "\\b"; "m"))
            ' <<<"$comments_json"
          )"

          echo "quorum-audit: author=${author_found} reviewer=${reviewer_found} boss=${boss_found} head=${PR_HEAD_SHA}"

          # TODO(ADR-0008): add lifecycle signature enforcement once an explicit lifecycle role exists.
          if [[ "$author_found" != "true" || "$reviewer_found" != "true" || "$boss_found" != "true" ]]; then
            exit 1
          fi
