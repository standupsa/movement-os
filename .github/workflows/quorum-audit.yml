name: quorum-audit

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: quorum-audit-pr-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  quorum-audit:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_review' || github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify quorum signatures on current head
        id: verify
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"

          if [[ "$event_name" == "pull_request" || "$event_name" == "pull_request_review" ]]; then
            pr_number="${{ github.event.pull_request.number }}"
          else
            pr_number="${{ github.event.issue.number }}"
          fi

          pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}")"
          pr_head_sha="$(jq -r '.head.sha' <<<"$pr_json")"
          issue_comments_json="$(
            gh api --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments?per_page=100"
          )"
          reviews_json="$(
            gh api --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/reviews?per_page=100"
          )"

          discussion_json="$(
            jq -n \
              --argjson issueComments "$issue_comments_json" \
              --argjson reviews "$reviews_json" \
              '[
                ($issueComments[]?[]? | {body}),
                ($reviews[]?[]? | select(.state != "DISMISSED") | {body: (.body // "")})
              ]'
          )"

          issue_comments_scanned="$(
            jq -n --argjson issueComments "$issue_comments_json" \
              '[ $issueComments[]?[]? ] | length'
          )"
          reviews_scanned="$(
            jq -n --argjson reviews "$reviews_json" \
              '[ $reviews[]?[]? | select(.state != "DISMISSED") ] | length'
          )"

          author_found="$(
            jq -r --arg sha "$pr_head_sha" '
              any(.[]; (.body // "") | test("^Agent WS[12]\\b.*\\b" + $sha + "\\b"; "m"))
            ' <<<"$discussion_json"
          )"

          reviewer_found="$(
            jq -r --arg sha "$pr_head_sha" '
              any(.[]; (.body // "") | test("^Agent R3:\\s+(no findings on|concur at) " + $sha + "\\b"; "m"))
            ' <<<"$discussion_json"
          )"

          boss_found="$(
            jq -r --arg sha "$pr_head_sha" '
              any(.[]; (.body // "") | test("^Agent BOSS:\\s+concur at " + $sha + "\\b"; "m"))
            ' <<<"$discussion_json"
          )"

          {
            echo "pr_head_sha=${pr_head_sha}"
            echo "author_found=${author_found}"
            echo "reviewer_found=${reviewer_found}"
            echo "boss_found=${boss_found}"
            echo "issue_comments_scanned=${issue_comments_scanned}"
            echo "reviews_scanned=${reviews_scanned}"
          } >> "$GITHUB_OUTPUT"

          echo "quorum-audit: author=${author_found} reviewer=${reviewer_found} boss=${boss_found} head=${pr_head_sha} issue_comments=${issue_comments_scanned} reviews=${reviews_scanned}"

          # TODO(ADR-0008): add lifecycle signature enforcement once an explicit lifecycle role exists.
          if [[ "$author_found" != "true" || "$reviewer_found" != "true" || "$boss_found" != "true" ]]; then
            exit 1
          fi

      - name: Publish quorum-audit check-run on PR HEAD
        if: always()
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ steps.verify.outputs.pr_head_sha }}
          AUTHOR_FOUND: ${{ steps.verify.outputs.author_found }}
          REVIEWER_FOUND: ${{ steps.verify.outputs.reviewer_found }}
          BOSS_FOUND: ${{ steps.verify.outputs.boss_found }}
          ISSUE_COMMENTS_SCANNED: ${{ steps.verify.outputs.issue_comments_scanned }}
          REVIEWS_SCANNED: ${{ steps.verify.outputs.reviews_scanned }}
        run: |
          set -euo pipefail

          if [[ -z "${PR_HEAD_SHA}" ]]; then
            echo "Skipping check-run publish because PR_HEAD_SHA is missing."
            exit 0
          fi

          if [[ "${AUTHOR_FOUND}" == "true" && "${REVIEWER_FOUND}" == "true" && "${BOSS_FOUND}" == "true" ]]; then
            conclusion="success"
            title="Quorum signatures verified"
          else
            conclusion="failure"
            title="Quorum signatures missing"
          fi

          summary="$(
            cat <<EOF
          author=${AUTHOR_FOUND}
          reviewer=${REVIEWER_FOUND}
          boss=${BOSS_FOUND}
          head=${PR_HEAD_SHA}
          issue_comments_scanned=${ISSUE_COMMENTS_SCANNED}
          reviews_scanned=${REVIEWS_SCANNED}
          lifecycle=not-enforced
          EOF
          )"

          payload="$(
            jq -n \
              --arg name "quorum-audit" \
              --arg head_sha "${PR_HEAD_SHA}" \
              --arg status "completed" \
              --arg conclusion "${conclusion}" \
              --arg title "${title}" \
              --arg summary "${summary}" \
              '{
                name: $name,
                head_sha: $head_sha,
                status: $status,
                conclusion: $conclusion,
                output: {
                  title: $title,
                  summary: $summary
                }
              }'
          )"

          if ! response="$(gh api "repos/${GITHUB_REPOSITORY}/check-runs" -X POST --input - <<<"${payload}" 2>&1)"; then
            echo "Failed to publish quorum-audit check-run:"
            echo "${response}"
            exit 0
          fi

          echo "Published quorum-audit check-run on ${PR_HEAD_SHA} with conclusion=${conclusion}."
