name = "wsa-extract-api"
main = "src/index.ts"
compatibility_date = "2026-04-18"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "extract-api.witnesssouthafrica.org"
custom_domain = true

[[durable_objects.bindings]]
name = "OPERATOR_RATE_LIMITER"
class_name = "OperatorRateLimiterDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OperatorRateLimiterDurableObject"]

[[r2_buckets]]
binding = "WSA_TELEMETRY"
bucket_name = "wsa-telemetry"

[vars]
XAI_API_BASE_URL = "https://api.x.ai/v1"
XAI_MODEL = "grok-4-fast-reasoning"
AUTH_REPLAY_WINDOW_SECONDS = "300"
RATE_LIMIT_REQUESTS_PER_MINUTE = "6"
RATE_LIMIT_MAX_INFLIGHT = "2"

[observability]
enabled = true
